<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>events — come-unity</title>
  <meta name="description" content="Upcoming and past events from come-unity. House and deep house in Edmonton, AB.">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

<nav>
  <a class="nav-logo" href="/">
    <img src="../assets/logo.png" alt="come-unity">
    come-unity
  </a>
  <div class="nav-links">
    <a href="../artists/">artists</a>
    <a href="../events/" class="active">events</a>
    <a href="https://instagram.com/poloismz" target="_blank" rel="noopener">instagram</a>
  </div>
</nav>

<!-- PAGE HERO -->
<div class="page-hero">
  <div class="inner">
    <div class="breadcrumb">
      <a href="/">come-unity</a>
      <span>›</span> events
    </div>
    <span class="eyebrow">on the calendar</span>
    <h1>events</h1>
    <p class="sub">upcoming &amp; past come-unity nights</p>
  </div>
</div>

<!-- UPCOMING -->
<section class="section">
  <div class="section-inner">
    <div class="section-label"><span class="eyebrow">upcoming</span></div>
    <div class="grid-2" id="upcoming-grid"></div>
  </div>
</section>

<!-- PAST -->
<section class="section" style="padding-top:0;">
  <div class="section-inner">
    <div class="section-label"><span class="eyebrow">past events</span></div>
    <div class="grid-2" id="past-grid"></div>
  </div>
</section>

<footer>
  <img class="foot-logo" src="../assets/logo.png" alt="come-unity">
  <div class="foot-brand">come-unity</div>
  <div class="foot-links">
    <a href="../artists/">artists</a>
    <a href="../events/">events</a>
    <a href="https://instagram.com/poloismz" target="_blank" rel="noopener">instagram</a>
    <a href="mailto:hello@come-unity.productions">hello@come-unity.productions</a>
  </div>
  <div class="copyright">© 2026 come-unity · Edmonton, AB</div>
</footer>

<script>
/* =========================================================
   EDIT EVENTS HERE
   ─────────────────────────────────────────────────────────
   Fields:
     title    string  — event display name
     date     string  — e.g. "19 July 2026"
     venue    string  — venue display name
     lineup   string  — text on the flyer (HTML ok, use <br>)
     image    string  — relative path to flyer image, or "" for gradient
     status   string  — "upcoming" | "past"
     tickets  string  — ticket URL, or "" to hide button
     slug     string  — relative link for the card, e.g. "elevate/"
   ========================================================= */
  const events = [
    {
      title:   "Elevate Saturdays",
      date:    "Every Saturday July & August",
      venue:   "The Cask & Barrel",
      lineup:  "elevate<br>saturdays",
      image:   "elevate cask.jpg",
      status:  "upcoming",
      tickets: "No Cover, Just Love ",
      slug:    "elevate/"
    }
    /* ── ADD MORE EVENTS HERE ──────────────────────────────
    {
      title:   "elevate saturdays vol. 2",
      date:    "2 August 2026",
      venue:   "The Cask & Barrel",
      lineup:  "poloismz<br>sotero",
      image:   "../assets/events/elevate-vol2.jpg",
      status:  "upcoming",
      tickets: "https://www.eventbrite.ca/...",
      slug:    "elevate/"
    },
    ────────────────────────────────────────────────────── */
  ];

  function makeCard(ev) {
    return `
      <a class="event-card" href="${ev.slug || '#'}">
        <div class="flyer" style="${ev.image ? `background-image:url('${ev.image}')` : ''}">
          <div>
            <div class="venue-tag">${ev.venue}</div>
            <div class="date-pill">${ev.date}</div>
          </div>
          <div class="lineup-text">${ev.lineup}</div>
        </div>
        <div class="body">
          <h3>${ev.title}</h3>
          <div class="meta">${ev.date} · ${ev.venue}</div>
          ${ev.tickets ? `<a href="${ev.tickets}" class="btn btn-primary" style="margin-top:14px;font-size:.8rem;padding:9px 20px;" target="_blank" onclick="event.stopPropagation()">get tickets</a>` : ''}
        </div>
      </a>
    `;
  }

  const upcoming = events.filter(e => e.status === 'upcoming');
  const past     = events.filter(e => e.status === 'past');

  const upcomingGrid = document.getElementById('upcoming-grid');
  const pastGrid     = document.getElementById('past-grid');

  const empty = `<p style="color:var(--text-dim);font-family:'Space Mono',monospace;font-size:.8rem;grid-column:1/-1;">nothing listed yet.</p>`;

  upcomingGrid.innerHTML = upcoming.length ? upcoming.map(makeCard).join('') : empty;
  pastGrid.innerHTML     = past.length     ? past.map(makeCard).join('')     : empty;
</script>

</body>
</html>
